<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB PALEN</title>
    <link rel="stylesheet" href="STYLE.CSS" />
</head>

<body>
    <div class="container">
        <div class="navbar-container">
            <ul class="ul-navbar">
                <li class="li-navbar"><a href="index.html" class="a-navbar">HOME</a></li>
                <li class="li-navbar"><a href="about.html" class="a-navbar">ABOUT ME</a></li>
                <li class="li-navbar"><a href="contact.html" class="a-navbar">CONTACT ME</a></li>
                <li class="li-navbar">
                    <button class="toggle-theme" id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙 DARK</button>
                </li>
            </ul>
        </div>

        <div class="container-content">
            <div class="hero-wrapper">
                <div class="hero-text">
                    <h2>HALO, SAYA PALENT! 👋</h2>
                    <p>Selamat datang di website pribadi saya. Silakan jelajahi halaman untuk mengenal saya lebih jauh melalui LinkedIn atau Instagram.</p>
                </div>
                <div class="hero-image">
                    <img src="IMG-20260706-WA0044.jpg" class="img-content" alt="Foto Palen" />
                </div>
            </div>
        </div>

        <div class="container-footer">
            <h1 class="h1-footer"> berusaha Semangat ngoding! 😉</h1>
        </div>
    </div>

    <script>
        const toggleButton = document.getElementById("theme-toggle");
        const savedTheme = localStorage.getItem("theme");
        const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const initialTheme = savedTheme || preferredTheme;

        document.body.classList.toggle("dark", initialTheme === "dark");
        if (toggleButton) {
            toggleButton.textContent = initialTheme === "dark" ? "☀️ LIGHT" : "🌙 DARK";
        }

        toggleButton?.addEventListener("click", () => {
            const isDark = document.body.classList.toggle("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            toggleButton.textContent = isDark ? "☀️ LIGHT" : "🌙 DARK";
        });
    </script>
</body>

</html>
